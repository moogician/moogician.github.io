<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 490" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="490" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="480" y="45" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700">Exploit Coverage by Benchmark</text>
  <text x="480" y="68" text-anchor="middle" fill="#94a3b8" font-size="13">Percentage of tasks exploitable without solving any task</text>

  <!-- Grid lines -->
  <g stroke="#334155" stroke-width="0.5" stroke-dasharray="4,4">
    <line x1="300" y1="90" x2="300" y2="470"/>
    <line x1="458" y1="90" x2="458" y2="470"/>
    <line x1="616" y1="90" x2="616" y2="470"/>
    <line x1="774" y1="90" x2="774" y2="470"/>
  </g>
  <!-- Grid labels -->
  <text x="300" y="485" text-anchor="middle" fill="#64748b" font-size="11">25%</text>
  <text x="458" y="485" text-anchor="middle" fill="#64748b" font-size="11">50%</text>
  <text x="616" y="485" text-anchor="middle" fill="#64748b" font-size="11">75%</text>
  <text x="774" y="485" text-anchor="middle" fill="#64748b" font-size="11">100%</text>

  <!-- Axis line -->
  <line x1="142" y1="90" x2="142" y2="470" stroke="#475569" stroke-width="1"/>

  <!-- Terminal-Bench - 100% -->
  <text x="138" y="118" text-anchor="end" fill="#e2e8f0" font-size="12.5" font-weight="500">Terminal-Bench</text>
  <rect x="142" y="101" width="632" height="26" rx="4" fill="url(#barGrad)" opacity="0.95" filter="url(#glow)"/>
  <text x="782" y="119" fill="#fca5a5" font-size="12" font-weight="700">100%</text>
  <text x="820" y="119" fill="#64748b" font-size="10.5">(89 tasks)</text>

  <!-- SWE-bench Verified - 100% -->
  <text x="138" y="160" text-anchor="end" fill="#e2e8f0" font-size="12.5" font-weight="500">SWE-bench Verified</text>
  <rect x="142" y="143" width="632" height="26" rx="4" fill="url(#barGrad)" opacity="0.92"/>
  <text x="782" y="161" fill="#fca5a5" font-size="12" font-weight="700">100%</text>
  <text x="820" y="161" fill="#64748b" font-size="10.5">(500 tasks)</text>

  <!-- SWE-bench Pro - 100% -->
  <text x="138" y="202" text-anchor="end" fill="#e2e8f0" font-size="12.5" font-weight="500">SWE-bench Pro</text>
  <rect x="142" y="185" width="632" height="26" rx="4" fill="url(#barGrad)" opacity="0.89"/>
  <text x="782" y="203" fill="#fca5a5" font-size="12" font-weight="700">100%</text>
  <text x="820" y="203" fill="#64748b" font-size="10.5">(731 tasks)</text>

  <!-- FieldWorkArena - 100% -->
  <text x="138" y="244" text-anchor="end" fill="#e2e8f0" font-size="12.5" font-weight="500">FieldWorkArena</text>
  <rect x="142" y="227" width="632" height="26" rx="4" fill="url(#barGrad)" opacity="0.86"/>
  <text x="782" y="245" fill="#fca5a5" font-size="12" font-weight="700">100%</text>
  <text x="820" y="245" fill="#64748b" font-size="10.5">(890 tasks)</text>

  <!-- WebArena - 100% -->
  <text x="138" y="286" text-anchor="end" fill="#e2e8f0" font-size="12.5" font-weight="500">WebArena</text>
  <rect x="142" y="269" width="632" height="26" rx="4" fill="url(#barGrad)" opacity="0.83"/>
  <text x="782" y="287" fill="#fca5a5" font-size="12" font-weight="700">100%</text>
  <text x="820" y="287" fill="#64748b" font-size="10.5">(812 tasks)</text>

  <!-- CAR-bench - 100% -->
  <text x="138" y="328" text-anchor="end" fill="#e2e8f0" font-size="12.5" font-weight="500">CAR-bench</text>
  <rect x="142" y="311" width="632" height="26" rx="4" fill="url(#barGrad)" opacity="0.80"/>
  <text x="782" y="329" fill="#fca5a5" font-size="12" font-weight="700">100%</text>
  <text x="820" y="329" fill="#64748b" font-size="10.5">(hallu.)</text>

  <!-- GAIA - 98% -->
  <text x="138" y="370" text-anchor="end" fill="#e2e8f0" font-size="12.5" font-weight="500">GAIA</text>
  <rect x="142" y="353" width="619" height="26" rx="4" fill="#f97316" opacity="0.85"/>
  <text x="769" y="371" fill="#fdba74" font-size="12" font-weight="700">~98%</text>
  <text x="812" y="371" fill="#64748b" font-size="10.5">(165 tasks)</text>

  <!-- OSWorld - 73% -->
  <text x="138" y="412" text-anchor="end" fill="#e2e8f0" font-size="12.5" font-weight="500">OSWorld</text>
  <rect x="142" y="395" width="462" height="26" rx="4" fill="#eab308" opacity="0.8"/>
  <text x="612" y="413" fill="#fde047" font-size="12" font-weight="700">73%</text>
  <text x="644" y="413" fill="#64748b" font-size="10.5">(270/369 tasks)</text>

  <!-- Zero capability label -->
  <rect x="330" y="450" width="300" height="24" rx="12" fill="#7f1d1d" opacity="0.6"/>
  <text x="480" y="466" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Zero tasks solved. Zero capability required.</text>
</svg>
