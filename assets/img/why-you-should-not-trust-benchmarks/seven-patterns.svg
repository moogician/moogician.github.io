<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 445" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="860" height="445" rx="16" fill="url(#bg6)"/>

  <text x="430" y="36" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">The Seven Deadly Patterns</text>
  <text x="430" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">Recurring vulnerability classes found across all eight benchmarks</text>

  <!-- ROW 1: Patterns 1–4 (x=21,228,435,642; w=197; h=75; y=75) -->
  <!-- single-line title: title y=+22, desc1 y=+47, desc2 y=+60; circle cy=+37 -->

  <!-- Pattern 1 -->
  <rect x="21" y="75" width="197" height="75" rx="10" fill="#1a1a2e" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="42" cy="112" r="13" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="42" y="117" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="800">1</text>
  <text x="64" y="97" fill="#f1f5f9" font-size="10" font-weight="600">No Agent/Evaluator Isolation</text>
  <text x="64" y="122" fill="#64748b" font-size="9">Agent and evaluator share</text>
  <text x="64" y="135" fill="#64748b" font-size="9">the same execution env</text>

  <!-- Pattern 2 -->
  <rect x="228" y="75" width="197" height="75" rx="10" fill="#1a1a2e" stroke="#f97316" stroke-width="1.5"/>
  <circle cx="249" cy="112" r="13" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="249" y="117" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="800">2</text>
  <text x="271" y="91" fill="#f1f5f9" font-size="10" font-weight="600">Answers Shipped</text>
  <text x="271" y="104" fill="#f1f5f9" font-size="10" font-weight="600">With the Test</text>
  <text x="271" y="122" fill="#64748b" font-size="9">Reference answers in task config</text>
  <text x="271" y="135" fill="#64748b" font-size="9">or public URLs</text>

  <!-- Pattern 3 -->
  <rect x="435" y="75" width="197" height="75" rx="10" fill="#1a1a2e" stroke="#eab308" stroke-width="1.5"/>
  <circle cx="456" cy="112" r="13" fill="#713f12" stroke="#eab308" stroke-width="1.5"/>
  <text x="456" y="117" text-anchor="middle" fill="#fde047" font-size="13" font-weight="800">3</text>
  <text x="478" y="97" fill="#f1f5f9" font-size="10" font-weight="600">eval() on Untrusted Input</text>
  <text x="478" y="122" fill="#64748b" font-size="9">Arbitrary code execution</text>
  <text x="478" y="135" fill="#64748b" font-size="9">on the grading machine</text>

  <!-- Pattern 4 -->
  <rect x="642" y="75" width="197" height="75" rx="10" fill="#1a1a2e" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="663" cy="112" r="13" fill="#581c87" stroke="#a855f7" stroke-width="1.5"/>
  <text x="663" y="117" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="800">4</text>
  <text x="685" y="97" fill="#f1f5f9" font-size="10" font-weight="600">Unsanitized LLM Judge Inputs</text>
  <text x="685" y="122" fill="#64748b" font-size="9">Prompt injection into</text>
  <text x="685" y="135" fill="#64748b" font-size="9">the evaluation LLM</text>

  <!-- ROW 2: Patterns 5–7 centered (x=125,332,539; w=197; h=75; y=162) -->
  <!-- two-line title (6,7): title1 y=+16, title2 y=+29, desc1 y=+47, desc2 y=+60; circle cy=+37 -->

  <!-- Pattern 5 -->
  <rect x="125" y="162" width="197" height="75" rx="10" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="146" cy="199" r="13" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="146" y="204" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="800">5</text>
  <text x="168" y="184" fill="#f1f5f9" font-size="10" font-weight="600">Weak String Matching</text>
  <text x="168" y="209" fill="#64748b" font-size="9">Substring checks,</text>
  <text x="168" y="222" fill="#64748b" font-size="9">over-aggressive normalization</text>

  <!-- Pattern 6 (two-line title) -->
  <rect x="332" y="162" width="197" height="75" rx="10" fill="#1a1a2e" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="353" cy="199" r="13" fill="#164e63" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="353" y="204" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="800">6</text>
  <text x="375" y="178" fill="#f1f5f9" font-size="10" font-weight="600">Evaluation Logic That</text>
  <text x="375" y="191" fill="#f1f5f9" font-size="10" font-weight="600">Doesn't Evaluate</text>
  <text x="375" y="209" fill="#64748b" font-size="9">Scoring code is broken,</text>
  <text x="375" y="222" fill="#64748b" font-size="9">skipped, or dead</text>

  <!-- Pattern 7 (two-line title) -->
  <rect x="539" y="162" width="197" height="75" rx="10" fill="#1a1a2e" stroke="#ec4899" stroke-width="1.5"/>
  <circle cx="560" cy="199" r="13" fill="#831843" stroke="#ec4899" stroke-width="1.5"/>
  <text x="560" y="204" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="800">7</text>
  <text x="582" y="178" fill="#f1f5f9" font-size="10" font-weight="600">Trusting Output of</text>
  <text x="582" y="191" fill="#f1f5f9" font-size="10" font-weight="600">Untrusted Code</text>
  <text x="582" y="209" fill="#64748b" font-size="9">Test results generated</text>
  <text x="582" y="222" fill="#64748b" font-size="9">in agent-controlled env</text>

  <!-- Benchmark matrix (y=255, height=175) -->
  <rect x="50" y="255" width="760" height="175" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="430" y="276" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">Which patterns affect which benchmarks?</text>

  <!-- Column headers -->
  <text x="270" y="298" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">SWE</text>
  <text x="320" y="298" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Web</text>
  <text x="370" y="298" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">OS</text>
  <text x="420" y="298" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Term</text>
  <text x="470" y="298" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Field</text>
  <text x="520" y="298" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">GAIA</text>
  <text x="570" y="298" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">CAR</text>

  <!-- Row: No isolation -->
  <text x="190" y="317" text-anchor="end" fill="#fca5a5" font-size="9">No isolation</text>
  <circle cx="270" cy="313" r="5" fill="#ef4444"/><circle cx="320" cy="313" r="5" fill="#ef4444"/><circle cx="370" cy="313" r="5" fill="#ef4444"/><circle cx="420" cy="313" r="5" fill="#ef4444"/>
  <circle cx="470" cy="313" r="5" fill="#334155"/><circle cx="520" cy="313" r="5" fill="#334155"/><circle cx="570" cy="313" r="5" fill="#334155"/>

  <!-- Row: Answers leaked -->
  <text x="190" y="333" text-anchor="end" fill="#fdba74" font-size="9">Answers leaked</text>
  <circle cx="270" cy="329" r="5" fill="#334155"/><circle cx="320" cy="329" r="5" fill="#f97316"/><circle cx="370" cy="329" r="5" fill="#f97316"/>
  <circle cx="420" cy="329" r="5" fill="#334155"/><circle cx="470" cy="329" r="5" fill="#334155"/><circle cx="520" cy="329" r="5" fill="#f97316"/>
  <circle cx="570" cy="329" r="5" fill="#334155"/>

  <!-- Row: eval() RCE -->
  <text x="190" y="349" text-anchor="end" fill="#fde047" font-size="9">eval() RCE</text>
  <circle cx="270" cy="345" r="5" fill="#334155"/><circle cx="320" cy="345" r="5" fill="#eab308"/><circle cx="370" cy="345" r="5" fill="#eab308"/>
  <circle cx="420" cy="345" r="5" fill="#334155"/><circle cx="470" cy="345" r="5" fill="#334155"/><circle cx="520" cy="345" r="5" fill="#334155"/>
  <circle cx="570" cy="345" r="5" fill="#334155"/>

  <!-- Row: LLM judge injection -->
  <text x="190" y="365" text-anchor="end" fill="#d8b4fe" font-size="9">LLM judge injection</text>
  <circle cx="270" cy="361" r="5" fill="#334155"/><circle cx="320" cy="361" r="5" fill="#a855f7"/>
  <circle cx="370" cy="361" r="5" fill="#334155"/><circle cx="420" cy="361" r="5" fill="#334155"/><circle cx="470" cy="361" r="5" fill="#334155"/>
  <circle cx="520" cy="361" r="5" fill="#334155"/><circle cx="570" cy="361" r="5" fill="#a855f7"/>

  <!-- Row: Weak string matching -->
  <text x="190" y="381" text-anchor="end" fill="#93c5fd" font-size="9">Weak matching</text>
  <circle cx="270" cy="377" r="5" fill="#334155"/><circle cx="320" cy="377" r="5" fill="#3b82f6"/><circle cx="370" cy="377" r="5" fill="#334155"/>
  <circle cx="420" cy="377" r="5" fill="#334155"/><circle cx="470" cy="377" r="5" fill="#334155"/><circle cx="520" cy="377" r="5" fill="#3b82f6"/>
  <circle cx="570" cy="377" r="5" fill="#334155"/>

  <!-- Row: Doesn't evaluate -->
  <text x="190" y="397" text-anchor="end" fill="#67e8f9" font-size="9">Doesn't evaluate</text>
  <circle cx="270" cy="393" r="5" fill="#334155"/><circle cx="320" cy="393" r="5" fill="#334155"/><circle cx="370" cy="393" r="5" fill="#334155"/>
  <circle cx="420" cy="393" r="5" fill="#334155"/><circle cx="470" cy="393" r="5" fill="#06b6d4"/><circle cx="520" cy="393" r="5" fill="#06b6d4"/>
  <circle cx="570" cy="393" r="5" fill="#06b6d4"/>

  <!-- Row: Trusting untrusted output -->
  <text x="190" y="413" text-anchor="end" fill="#f9a8d4" font-size="9">Trusting untrusted</text>
  <circle cx="270" cy="409" r="5" fill="#ec4899"/><circle cx="320" cy="409" r="5" fill="#334155"/><circle cx="370" cy="409" r="5" fill="#334155"/>
  <circle cx="420" cy="409" r="5" fill="#ec4899"/><circle cx="470" cy="409" r="5" fill="#334155"/><circle cx="520" cy="409" r="5" fill="#334155"/>
  <circle cx="570" cy="409" r="5" fill="#334155"/>

  <!-- Legend -->
  <circle cx="680" cy="361" r="5" fill="#ef4444"/>
  <text x="690" y="365" fill="#94a3b8" font-size="9">Affected</text>
  <circle cx="680" cy="377" r="5" fill="#334155"/>
  <text x="690" y="381" fill="#94a3b8" font-size="9">Not affected</text>
</svg>
