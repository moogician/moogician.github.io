<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 570" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="860" height="570" rx="16" fill="url(#bg6)"/>

  <text x="430" y="36" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700">The Seven Deadly Patterns</text>
  <text x="430" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">Recurring vulnerability classes found across all eight benchmarks</text>

  <!-- Pattern 1 -->
  <rect x="30" y="75" width="390" height="58" rx="10" fill="#1a1a2e" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="55" cy="104" r="14" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
  <text x="55" y="109" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="800">1</text>
  <text x="78" y="96" fill="#f1f5f9" font-size="12" font-weight="600">No Agent/Evaluator Isolation</text>
  <text x="78" y="113" fill="#94a3b8" font-size="10">SWE-bench, Terminal-Bench, OSWorld, WebArena</text>
  <text x="78" y="127" fill="#64748b" font-size="9">Agent code runs in the same env the evaluator inspects</text>

  <!-- Pattern 2 -->
  <rect x="440" y="75" width="390" height="58" rx="10" fill="#1a1a2e" stroke="#f97316" stroke-width="1.5"/>
  <circle cx="465" cy="104" r="14" fill="#7c2d12" stroke="#f97316" stroke-width="1.5"/>
  <text x="465" y="109" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="800">2</text>
  <text x="488" y="96" fill="#f1f5f9" font-size="12" font-weight="600">Answers Shipped With the Test</text>
  <text x="488" y="113" fill="#94a3b8" font-size="10">WebArena, OSWorld, GAIA</text>
  <text x="488" y="127" fill="#64748b" font-size="9">Reference answers in task config or public URLs</text>

  <!-- Pattern 3 -->
  <rect x="30" y="148" width="390" height="58" rx="10" fill="#1a1a2e" stroke="#eab308" stroke-width="1.5"/>
  <circle cx="55" cy="177" r="14" fill="#713f12" stroke="#eab308" stroke-width="1.5"/>
  <text x="55" y="182" text-anchor="middle" fill="#fde047" font-size="13" font-weight="800">3</text>
  <text x="78" y="169" fill="#f1f5f9" font-size="12" font-weight="600">eval() on Untrusted Input</text>
  <text x="78" y="186" fill="#94a3b8" font-size="10">WebArena, OSWorld</text>
  <text x="78" y="200" fill="#64748b" font-size="9">Arbitrary code execution on the grading machine</text>

  <!-- Pattern 4 -->
  <rect x="440" y="148" width="390" height="58" rx="10" fill="#1a1a2e" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="465" cy="177" r="14" fill="#581c87" stroke="#a855f7" stroke-width="1.5"/>
  <text x="465" y="182" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="800">4</text>
  <text x="488" y="169" fill="#f1f5f9" font-size="12" font-weight="600">Unsanitized LLM Judge Inputs</text>
  <text x="488" y="186" fill="#94a3b8" font-size="10">WebArena, CAR-bench</text>
  <text x="488" y="200" fill="#64748b" font-size="9">Prompt injection into evaluation LLM</text>

  <!-- Pattern 5 -->
  <rect x="30" y="221" width="390" height="58" rx="10" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="55" cy="250" r="14" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="55" y="255" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="800">5</text>
  <text x="78" y="242" fill="#f1f5f9" font-size="12" font-weight="600">Weak String Matching</text>
  <text x="78" y="259" fill="#94a3b8" font-size="10">WebArena, GAIA</text>
  <text x="78" y="273" fill="#64748b" font-size="9">Substring checks, over-aggressive normalization</text>

  <!-- Pattern 6 -->
  <rect x="440" y="221" width="390" height="58" rx="10" fill="#1a1a2e" stroke="#06b6d4" stroke-width="1.5"/>
  <circle cx="465" cy="250" r="14" fill="#164e63" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="465" y="255" text-anchor="middle" fill="#67e8f9" font-size="13" font-weight="800">6</text>
  <text x="488" y="242" fill="#f1f5f9" font-size="12" font-weight="600">Evaluation Logic That Doesn't Evaluate</text>
  <text x="488" y="259" fill="#94a3b8" font-size="10">FieldWorkArena, CAR-bench, GAIA</text>
  <text x="488" y="273" fill="#64748b" font-size="9">Scoring code is broken, skipped, or dead</text>

  <!-- Pattern 7 -->
  <rect x="235" y="294" width="390" height="58" rx="10" fill="#1a1a2e" stroke="#ec4899" stroke-width="1.5"/>
  <circle cx="260" cy="323" r="14" fill="#831843" stroke="#ec4899" stroke-width="1.5"/>
  <text x="260" y="328" text-anchor="middle" fill="#f9a8d4" font-size="13" font-weight="800">7</text>
  <text x="283" y="315" fill="#f1f5f9" font-size="12" font-weight="600">Trusting Output of Untrusted Code</text>
  <text x="283" y="332" fill="#94a3b8" font-size="10">SWE-bench, Terminal-Bench</text>
  <text x="283" y="346" fill="#64748b" font-size="9">Test results generated inside agent-controlled env</text>

  <!-- Benchmark matrix -->
  <rect x="50" y="375" width="760" height="175" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="430" y="396" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">Which patterns affect which benchmarks?</text>

  <!-- Column headers -->
  <text x="270" y="418" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">SWE</text>
  <text x="320" y="418" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Web</text>
  <text x="370" y="418" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">OS</text>
  <text x="420" y="418" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Term</text>
  <text x="470" y="418" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Field</text>
  <text x="520" y="418" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">GAIA</text>
  <text x="570" y="418" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">CAR</text>

  <!-- Row: No isolation -->
  <text x="190" y="437" text-anchor="end" fill="#fca5a5" font-size="9">No isolation</text>
  <circle cx="270" cy="433" r="5" fill="#ef4444"/><circle cx="320" cy="433" r="5" fill="#ef4444"/><circle cx="370" cy="433" r="5" fill="#ef4444"/><circle cx="420" cy="433" r="5" fill="#ef4444"/>
  <circle cx="470" cy="433" r="5" fill="#334155"/><circle cx="520" cy="433" r="5" fill="#334155"/><circle cx="570" cy="433" r="5" fill="#334155"/>

  <!-- Row: Answers leaked -->
  <text x="190" y="453" text-anchor="end" fill="#fdba74" font-size="9">Answers leaked</text>
  <circle cx="270" cy="449" r="5" fill="#334155"/><circle cx="320" cy="449" r="5" fill="#f97316"/><circle cx="370" cy="449" r="5" fill="#f97316"/>
  <circle cx="420" cy="449" r="5" fill="#334155"/><circle cx="470" cy="449" r="5" fill="#334155"/><circle cx="520" cy="449" r="5" fill="#f97316"/>
  <circle cx="570" cy="449" r="5" fill="#334155"/>

  <!-- Row: LLM judge injection -->
  <text x="190" y="469" text-anchor="end" fill="#d8b4fe" font-size="9">LLM judge injection</text>
  <circle cx="270" cy="465" r="5" fill="#334155"/><circle cx="320" cy="465" r="5" fill="#a855f7"/>
  <circle cx="370" cy="465" r="5" fill="#334155"/><circle cx="420" cy="465" r="5" fill="#334155"/><circle cx="470" cy="465" r="5" fill="#334155"/>
  <circle cx="520" cy="465" r="5" fill="#334155"/><circle cx="570" cy="465" r="5" fill="#a855f7"/>

  <!-- Row: eval() RCE -->
  <text x="190" y="485" text-anchor="end" fill="#fde047" font-size="9">eval() RCE</text>
  <circle cx="270" cy="481" r="5" fill="#334155"/><circle cx="320" cy="481" r="5" fill="#eab308"/><circle cx="370" cy="481" r="5" fill="#eab308"/>
  <circle cx="420" cy="481" r="5" fill="#334155"/><circle cx="470" cy="481" r="5" fill="#334155"/><circle cx="520" cy="481" r="5" fill="#334155"/>
  <circle cx="570" cy="481" r="5" fill="#334155"/>

  <!-- Row: Weak string matching -->
  <text x="190" y="501" text-anchor="end" fill="#93c5fd" font-size="9">Weak matching</text>
  <circle cx="270" cy="497" r="5" fill="#334155"/><circle cx="320" cy="497" r="5" fill="#3b82f6"/><circle cx="370" cy="497" r="5" fill="#334155"/>
  <circle cx="420" cy="497" r="5" fill="#334155"/><circle cx="470" cy="497" r="5" fill="#334155"/><circle cx="520" cy="497" r="5" fill="#3b82f6"/>
  <circle cx="570" cy="497" r="5" fill="#334155"/>

  <!-- Row: Doesn't evaluate -->
  <text x="190" y="517" text-anchor="end" fill="#67e8f9" font-size="9">Doesn't evaluate</text>
  <circle cx="270" cy="513" r="5" fill="#334155"/><circle cx="320" cy="513" r="5" fill="#334155"/><circle cx="370" cy="513" r="5" fill="#334155"/>
  <circle cx="420" cy="513" r="5" fill="#334155"/><circle cx="470" cy="513" r="5" fill="#06b6d4"/><circle cx="520" cy="513" r="5" fill="#06b6d4"/>
  <circle cx="570" cy="513" r="5" fill="#06b6d4"/>

  <!-- Row: Trusting untrusted output -->
  <text x="190" y="533" text-anchor="end" fill="#f9a8d4" font-size="9">Trusting untrusted</text>
  <circle cx="270" cy="529" r="5" fill="#ec4899"/><circle cx="320" cy="529" r="5" fill="#334155"/><circle cx="370" cy="529" r="5" fill="#334155"/>
  <circle cx="420" cy="529" r="5" fill="#ec4899"/><circle cx="470" cy="529" r="5" fill="#334155"/><circle cx="520" cy="529" r="5" fill="#334155"/>
  <circle cx="570" cy="529" r="5" fill="#334155"/>

  <!-- Legend -->
  <circle cx="680" cy="481" r="5" fill="#ef4444"/>
  <text x="690" y="485" fill="#94a3b8" font-size="9">Affected</text>
  <circle cx="680" cy="501" r="5" fill="#334155"/>
  <text x="690" y="505" fill="#94a3b8" font-size="9">Not affected</text>
</svg>
