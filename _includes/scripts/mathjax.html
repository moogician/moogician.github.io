  {%- if site.enable_math -%}
  <!-- MathJax -->
  <script type="text/javascript">
    window.MathJax = {
      tex: {
        tags: 'ams',
        macros: {
          CC: ["\\mathrm{\\mathbf{#1}}", 1],
          RTIME: ["\\CC{RTIME}(#1)", 1],
          RP: "\\CC{RP}",
          coRP: "\\CC{coRP}",
          ZTIME: ["\\CC{ZTIME}(#1)", 1],
          ZPP: "\\CC{ZPP}",
          BPP: "\\CC{BPP}",
          BPNP: "\\CC{BP\\cdot NP}",

          BPL: "\\CC{BPL}",
          RL: "\\CC{RL}",

          P: "\\CC{P}",
          NP: "\\CC{NP}",
          NPpoly: "\\CC{NP}_{/poly}",
          Ppoly: "\\CC{P}_{/poly}",
          AC: ["\\CC{AC}^{#1}", 1],
          NC: ["\\CC{NC}^{#1}", 1],

          TISP: ["\\CC{TISP}(#1, #2)", 2],

          Lang: ["\\mathrm{#1}", 1],
          SAT: "\\Lang{SAT}",

          prob: ["\\mathop{P}\\limits_{#1}(#2)", 2],
          expectation: ["\\mathop{\\mathbb{E}}\\limit_{#1}[#2]", 2],
        }
      },
    };
  </script>
  <script defer type="text/javascript" id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@{{ site.mathjax.version }}/es5/tex-mml-chtml.js"></script>
  <script defer src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  {%- endif %}
